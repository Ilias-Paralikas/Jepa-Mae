run_name: mae

data:
  img_size: 256
  in_chans: 3
  tanh_space: true    # true -> display: x*0.5+0.5; false -> display: clamp(0,1)
  batch_size: 32
  num_workers: 4

model:
  patch_size: 8
  mlp_ratio: 4.0
  mask_ratio: 0.5
  patch_embed:
    hidden_dims: [1024, 1024]
  encoder:
    encoder_embed_dim: 768
    encoder_depth: 12
    encoder_num_heads: 16
    mlp_ratio: 4.0
  decoder:
    decoder_embed_dim: 512
    decoder_depth: 8
    decoder_num_heads: 16


training:
  base_dir: runs
  epochs: 200
  lr: 2.0e-4
  min_lr: 2.0e-4
  weight_decay: 0.05
  warmup_epochs: 0
  save_every: 1
  plot_every: 200
  grad_clip: 1.0


loss:
  reconstruction_weight: 1.0
